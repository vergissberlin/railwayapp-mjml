name: release-please

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Use github.token (not secrets.GITHUB_TOKEN — that is not set by GitHub).
          # If the repo blocks GITHUB_TOKEN from opening PRs, add a classic PAT with repo scope as RELEASE_PLEASE_TOKEN.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          include-component-in-tag: true
          skip-github-pull-request: false
          skip-github-release: false
